<!DOCTYPE html>
<html>
<head>
  <title>Carson SMP Games</title>

  <link rel="icon" type="image/png" href="favicon.png">

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header>
    <h1>Carson SMP Games</h1>
    <div class="subtitle">By Dankle and Really Cool Guy</div>
  </header>

  <!-- GAME GRID -->
  <div class="games">

    <div class="game-card" onclick="openGame('https://smapskajendfjshwbekf-prog.github.io/newcargame/')">
      <img src="assets/polytrack.png">
      <div class="game-title">Poly Track</div>
    </div>

    <div class="game-card" onclick="openGame('https://smapskajendfjshwbekf-prog.github.io/eaglercraft/')">
      <img src="assets/eaglercraft.png">
      <div class="game-title">EaglerCraft</div>
    </div>

    <div class="game-card" onclick="openGame('https://pokigamez.github.io/geometrydash/')">
      <img src="assets/geometrydash.png">
      <div class="game-title">Geometry Dash</div>
    </div>

    <div class="game-card" onclick="openGame('https://games.carsonsmp.online/drift-boss/')">
      <img src="assets/driftboss.png">
      <div class="game-title">Drift Boss</div>
    </div>

    <div class="game-card" onclick="openGame('https://f9564e4e-ef25-4e4b-ba67-cb11a1576bbd.poki-gdn.com/cc1bc57a-e355-4696-97c2-097bf6188606/index.html?country=US&url_referrer=https%3A%2F%2Fpoki.com%2F&site_id=3&iso_lang=en&poki_url=https%3A%2F%2Fpoki.com%2Fen%2Fg%2Fdrive-mad&hoist=yes&nonPersonalized=n&cloudsavegames=n&familyFriendly=n&categories=78%2C93%2C96%2C103%2C377%2C390%2C400%2C893%2C929%2C1126%2C1139%2C1140%2C1141%2C1143%2C1147%2C1163%2C1185%2C1190%2C1193%2C1197&special_condition=landing&game_id=f9564e4e-ef25-4e4b-ba67-cb11a1576bbd&game_version_id=cc1bc57a-e355-4696-97c2-097bf6188606&inspector=0')">
      <img src="assets/drivemad.png">
      <div class="game-title">Drive Mad</div>
    </div>

    <div class="game-card" onclick="openGame('https://example.com')">
      <img src="assets/drive-mad-2.png">
      <div class="game-title">Drive Mad 2</div>
    </div>

    <div class="game-card" onclick="openGame('https://example.com')">
      <img src="assets/game1.png">
      <div class="game-title">Game 3</div>
    </div>

    <div class="game-card" onclick="openGame('https://example.com')">
      <img src="assets/game1.png">
      <div class="game-title">Game 4</div>
    </div>

  </div>

  <!-- POPUP -->
  <div id="popup" class="popup">
    <div class="popup-content" id="popupContent">

      <span class="fullscreen-btn" id="fsBtn" onclick="toggleFullscreen()">⛶</span>
      <span class="close-btn" onclick="closeGame()">✖</span>

      <iframe id="gameFrame"></iframe>
    </div>
  </div>

  <script>
    function openGame(url) {
      document.getElementById("popup").style.display = "flex";
      document.getElementById("gameFrame").src = url;
    }

    function closeGame() {
      document.getElementById("popup").style.display = "none";
      document.getElementById("gameFrame").src = "";
      exitFullscreen();
    }

    function toggleFullscreen() {
      const elem = document.getElementById("popupContent");

      if (!document.fullscreenElement) {
        elem.requestFullscreen();
        document.getElementById("fsBtn").textContent = "🡼";
      } else {
        document.exitFullscreen();
        document.getElementById("fsBtn").textContent = "⛶";
      }
    }

    function exitFullscreen() {
      if (document.fullscreenElement) {
        document.exitFullscreen();
      }
      document.getElementById("fsBtn").textContent = "⛶";
    }

    window.onload = () => {
      document.body.classList.add("loaded");
    };
  </script>

</body>
</html>
